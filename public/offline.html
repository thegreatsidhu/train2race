<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#2DD4BF" />
  <title>Train2Race — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0F1117;
      color: #F1F5F9;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    img { width: 64px; height: 64px; border-radius: 16px; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { color: #94A3B8; font-size: 0.9rem; line-height: 1.6; max-width: 280px; }
    button {
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      border-radius: 9999px;
      background: #2DD4BF;
      color: #0F1117;
      font-weight: 600;
      font-size: 0.9rem;
      border: none;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <img src="/logo.png" alt="Train2Race" />
  <h1>You're offline</h1>
  <p>Check your connection and try again. Your cached data is still available.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
