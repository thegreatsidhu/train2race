<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Teal fill covers entire square — safe for any Android crop shape -->
  <rect width="512" height="512" fill="#0D9488"/>
  <!-- Slightly lighter teal center gradient effect -->
  <circle cx="256" cy="256" r="256" fill="#2DD4BF" opacity="0.3"/>
  <!-- "T2R" monogram, scaled to fit safely inside the 80% safe zone (within r=204 circle) -->
  <text
    x="256"
    y="278"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-weight="800"
    font-size="164"
    letter-spacing="-6"
    fill="#0F1117"
  >T2R</text>
  <!-- Underline accent -->
  <rect x="152" y="322" width="208" height="5" rx="2.5" fill="#0F1117" opacity="0.4"/>
</svg>
