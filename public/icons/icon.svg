<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark background -->
  <rect width="512" height="512" fill="#0F1117"/>
  <!-- Teal accent bar at bottom -->
  <rect x="0" y="480" width="512" height="32" fill="#2DD4BF" opacity="0.15"/>
  <!-- Stylized "T2R" monogram -->
  <text
    x="256"
    y="300"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-weight="800"
    font-size="196"
    letter-spacing="-8"
    fill="#2DD4BF"
  >T2R</text>
  <!-- Underline accent -->
  <rect x="112" y="340" width="288" height="6" rx="3" fill="#2DD4BF" opacity="0.5"/>
  <!-- Subtext -->
  <text
    x="256"
    y="400"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-weight="500"
    font-size="44"
    letter-spacing="12"
    fill="#2DD4BF"
    opacity="0.6"
  >RACE</text>
</svg>
